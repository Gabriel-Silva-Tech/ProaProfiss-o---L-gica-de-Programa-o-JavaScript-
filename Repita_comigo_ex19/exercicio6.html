    <script>

        let nota1 = parseFloat(prompt("Digite a 1° nota do Bimestre: "))
        let nota2 = parseFloat(prompt("Digite a 2° nota do Bimestre: "))
        let aluno2 = parseFloat(alert("Calcular a média de outro aluno Sim/Não?"))
        let media = (nota1 + nota2) / 2 

        if(media < 9.5 ){
            document.write("A média final desse aluno é " + media + " então, ele(a) está reprovado(a)")
        }

        // O else não precisa das chaves para funcionar

              document.write("A média final desse aluno é " + media + " então, ele(a) está aprovado(a)")
        }
