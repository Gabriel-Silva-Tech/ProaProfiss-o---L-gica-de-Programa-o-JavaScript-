<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 08: Leitura do valor N </title>
</head>
<body>
    <h1> Leitura do valor N </h1>
    <script>
        
        let N = parseInt(prompt("Digite N:"));

        for (let i = 1; i <= N; i++) {

            document.write(i + "<br>");

        }
    </script>
</body>
</html>
