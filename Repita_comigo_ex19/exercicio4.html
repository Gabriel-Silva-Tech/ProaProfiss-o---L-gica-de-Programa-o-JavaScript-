<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 04: média aritmetica entre 15 e 100 </title>
</head>
<body>
    <h1> Calculo da média aritimetica </h1>

    <script>

        let soma = 0 
        let quantidade = 0

        for(let n= 15; n <= 100; n++){
            soma = soma +  n
            quantidade++;
        }

        let media = soma / quantidade 

        document.write(soma + "<br>")
        document.write("A média desse calculo é igual á " + media)

    </script>
</body>
</html>
