<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10: Tabuadas de 1 a N</title>
</head>
<body>
    <h1>Tabuadas de 1 a N</h1>

    <script>

        let N = parseInt(prompt("Digite um numero:"));

        for (let i = 1; i <= N; i++) 
        {
            for (let j = 1; j <= 10; j++)
             {
                document.write(i + " x " + j + " = " + (i * j) + "<br>");
            }
        }
    </script>
</body>
</html>
