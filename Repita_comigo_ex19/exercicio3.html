<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 03: contagem em ordem descrecente </title>
</head>
<body>
    <h1> Contagem em ordem descrecente </h1>
    <script>

        let contador = 10

        for( let contador = 10; contador > 0; contador--){
            document.write(contador + "<br> ");
        }
    </script>
</body>
</html>
