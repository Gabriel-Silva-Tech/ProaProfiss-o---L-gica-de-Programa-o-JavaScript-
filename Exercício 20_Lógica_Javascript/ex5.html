<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 05: Tabuada </title>
</head>
<body>

   <h1>Exercício 05: Tabuada </h1> 

    <script>

        let num = Number(prompt("Digite um valor: "))
        let contador = 1

        while(contador <=10){

             let resultado = num * contador
             document.write(num + "x" + contador + "=" + resultado + "<br>");
             contador++;
        }


    </script>
</body>
</html>
