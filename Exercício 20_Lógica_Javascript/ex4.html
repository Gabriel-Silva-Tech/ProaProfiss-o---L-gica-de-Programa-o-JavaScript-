<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 04: Programa que calcula media de 5 numeros inteiro </title>
</head>
<body>

   <h1>Exercício 04: Programa que calcula media de 5 numeros inteiro </h1> 
   
    <script>

       let contador = 1 
        let soma = 0

        while(contador <= 5){

            media = (soma / 5)
            
            let numero = Number(prompt("Digite cinco valores aqui: "))

            soma = soma + numero
            contador++
        }
        
        document.write("O valor da média é: " + media + "<br>")

    </script>
</body>
</html>
