<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>

    <h1> Exercício 16: Exibição de números de 1 a 10 com do while </h1>
     <script>

        let cont = 1;

        do{
            document.write(cont + "<br>")
            cont++
            
        } while(cont <= 10)

     </script>
</body>
</html>
