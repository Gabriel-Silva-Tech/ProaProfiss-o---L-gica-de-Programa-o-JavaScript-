<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 01: Exibição de números de 1 a 10 com loop"While" </title>
</head>
<body>

    <h1> Exercício 01: Exibição de números de 1 a 10 com loop While </h1>
    <script>

        var cont = 0;
        while(cont < 10){
            cont++
            document.write(cont + "<br>")
        }

    </script>
</body>
</html>
