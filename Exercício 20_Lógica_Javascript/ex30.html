    <h1> Exercício 30 </h1>

     <script>
        
       let nome 
       idade
       total = 0, 
       qtd = 0;

        do {
             nome = prompt("Nome (ou 'fim'):");

        if (nome !== "fim") {

        idade = Number(prompt("Idade:"));

        total += idade;

        qtd++;
      }

        } while (nome !== "fim");

        media = total / qtd

        document.write("Média final: " + (media).toFixed(2));

     </script>
