<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 03: Programa que ler 5 numeros pares de 1 a 50 </title>
</head>
<body>

   <h1> Exercício 03: Programa que ler 5 numeros pares de 1 a 50 </h1> 

   <script>
        let numero = 0

        while (numero < 50){
            numero = numero + 1 
            numero++
            document.write(numero + "<br>")
        }

        document.write(numero + "<br>")
    </script>
</body>
</html>
