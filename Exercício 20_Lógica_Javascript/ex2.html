<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 02: Programa que calcula a soma de 1 a 100 </title>
</head>
<body>

    <h1> Exercício 02: Programa que calcula a soma de 1 a 100 </h1>
    <script>
     
        let cont = 0
        let soma = 0

        while (cont < 100){
            soma = soma + cont //valor de 0 mais o valor do cont 100x.
            cont++
            document.write(soma + "<br>")
        }

        document.write("O resultado da soma é igua á: " + soma + "<br>")
    </script>
</body>
</html>
