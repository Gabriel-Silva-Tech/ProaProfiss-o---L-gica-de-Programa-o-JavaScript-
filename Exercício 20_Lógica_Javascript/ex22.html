<!DOCTYPE html>
<html lang="pt-br">

<body>

    <h1> Exercício 22 </h1>

     <script>

    let numero = Number(prompt("Digite um número:"));

    do {

    document.write((numero % 10) + "<br>");

    numero = Math.floor(numero / 10);

    } while (numero > 0);

     </script>
</body>
