<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>

    <h1> Exercício 29 </h1>

     <script>
        
      let fat = Number(prompt("Fatorial de:"));

        let res = 1;

        do {
          if (fat === 0) break;

            res *= fat;

            fat--;

            } while (fat > 0);

            document.write("Fatorial: " + res);

     </script>
</body>
</html>
