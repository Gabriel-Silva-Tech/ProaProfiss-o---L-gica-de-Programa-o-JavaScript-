    <h1>Exercício 10: Sequencia de fibonacci (20 numeros)  </h1> 

    <script>
        let numero_atual = 0 
        let numero_anterior = 1
        let proximo_numero = 0
        let contador = 1 
        let s_final = 20

        let fibonacci = Number(prompt("Para ver a sequencia, digite um valor inteito: "))

        while(contador < s_final){
            document.write(numero_atual + "<br>")

            let proximo_numero = numero_atual + numero_anterior; 
            numero_anterior = numero_atual;

             contador++
            }
            
    </script>
