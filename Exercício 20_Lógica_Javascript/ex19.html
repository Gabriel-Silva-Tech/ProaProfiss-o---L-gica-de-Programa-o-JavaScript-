<body>

    <h1> Exercício 19 </h1>

     <script>

        let contador
        let soma = 0
        let numero; 

        do{
            numero = Number(prompt("Digite um numero:"))
            soma += numero;
            contador++

        } while (contador <= 5)

        document.write("O valor da soma é: " + soma + "<br>")

     </script>
