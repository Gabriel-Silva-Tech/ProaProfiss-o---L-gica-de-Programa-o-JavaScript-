<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>

    <h1> Exercício 41 </h1>

     <script>
        
      let limite = Number(prompt("Até quanto:"));
        let soma = 0;
        for (let i = 1; i <= limite; i++) { if (i % 2 === 0) soma += i; }
        document.write("Soma: " + soma);

     </script>
</body>
