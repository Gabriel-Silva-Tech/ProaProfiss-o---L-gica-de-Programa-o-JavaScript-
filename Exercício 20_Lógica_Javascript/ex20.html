<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>

    <h1> Exercício 20 </h1>

     <script>

    let num = Number(prompt("Tabuada de qual número?"));

    let multiplo= 1;

    do {
    document.write(num + "x" + multiplo + "=" + num * multiplo + "<br>");

    multiplo++;

    } while (multiplo <= 10);

     </script>
</body>
</html>
