<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 07: Analise de numero primo  </title>
</head>
<body>
    <h1> Exercício 07: Analise de numero primo  </h1> 
    <script>

        let numero = Number(prompt("Escreva um numero: "))
        let divisor = Number(prompt("Escreva um divisor: "))

        while(numero % divisor === 0){

            if(numero % divisor === 0){
                   document.write(" O valor calculado não é um numero primo")   
                   divisor++  
            break

        } else{
            document.write("O valor calculado é um numero primo")
            break

        }
    }

    </script>
</body>
</html>
