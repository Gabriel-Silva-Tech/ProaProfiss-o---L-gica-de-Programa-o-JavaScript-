<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>

    <h1> Exercício 19 </h1>

     <script>
    
       let numero = Number(prompt("Digite um numero inteiro"));
       let divisor = 2;
       let primo = true;


        if (numero < 2) {
        primo = false;
                } 

        else if (numero > 2) {

        do {

            if (numero % divisor === 0) {
              primo = false; 
             break; 
        }

        divisor++;

             } while (divisor < numero);
        }

        if (primo) {
             document.write("O número " + numero + " é Primo.");

            } else {
                document.write("O número " + numero + " NÃO é primo.");
                    }
     </script>
</body>
</html>
