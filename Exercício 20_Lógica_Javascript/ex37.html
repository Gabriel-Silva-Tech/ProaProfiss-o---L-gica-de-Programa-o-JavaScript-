<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

<body>

    <h1> Exercício 37 </h1>

     <script>
        
        let numero = Number(prompt("Número:"));
        let primo = numero > 1;
            for (let i = 2; i < numero; i++) { if (numero % i === 0) 
                { primo = false; break; } }
                
            document.write(primo ? "Primo" : "Não é");

     </script>
</body>
</html>
