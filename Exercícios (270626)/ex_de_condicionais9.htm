    <h1> Salario minimo </h1>
<body>
    <script>
        
        let Sal_Minimo = parseFloat(prompt("Quanto está o salario minimo no seu Estado?"))

        let Sal_usuario 
        Sal_usuario = parseFloat(prompt("Quanto você ganha por mês?: "));

        let quantidade = Sal_usuario / Sal_Minimo

        document.write("O resultado do valor é igual à " + quantidade .toFixed(2) + " salarios minimos");

    </script>
</body>
