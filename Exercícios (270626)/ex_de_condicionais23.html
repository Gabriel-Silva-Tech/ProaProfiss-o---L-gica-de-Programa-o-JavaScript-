<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 23: Contar números em faixas</title>
</head>
<body>
    <h1>Exercício 23: Contar números em faixas</h1>
    <p>Clique no botão para executar o programa.</p>
    <button onclick="contarNumeros()">Executar</button>
    <p id="resultado"></p>

    <script>
        function contarNumeros() {
            let count0to100 = 0;
            let count101to200 = 0;
            let countAbove200 = 0;
            for (let i = 1; i <= 20; i++) {
                let numero = parseFloat(prompt(`Digite o ${i}º número:`));
                if (numero >= 0 && numero <= 100) {
                    count0to100++;
                } else if (numero >= 101 && numero <= 200) {
                    count101to200++;
                } else if (numero > 200) {
                    countAbove200++;
                }
            }
            document.getElementById('resultado').innerHTML = 
                `Números entre 0 e 100: ${count0to100}<br>` +
                `Números entre 101 e 200: ${count101to200}<br>` +
                `Números maiores que 200: ${countAbove200}`;
        }
    </script>
</body>
</html>
