<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 06: Sucessor e Antecessor </title>
</head>
<body>
    <h1> Exercício 06: Sucessor e Antecessor de numeros inteiros </h1>
    <script>
        document.write("O número digitado tem como: ")
        let numero = parseFloat(prompt("Digite um número: "));
        let numero_sucessor = numero + 1 
        let numero_antecessor = numero - 1

        document.write("<br>Numero Antecessor: " + numero_antecessor);
        document.write(" <br> Numero Sucessor: " + numero_sucessor);

    </script>
</body>
</html>
