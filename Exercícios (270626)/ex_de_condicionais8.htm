    <h1> Exercício 08: Porcentagem do IPI</h1>
<body>  
    <script>

        document.write("O valor de acrescimo do IPI nas peças é igual à: ")

        let valor_un1_1 = (prompt("Quanto equivale o valor da unidade?"))
        let valor_qu1_1 = (prompt("Quanto é a quantidade desejada?"))

        let valor_un2_2 = (prompt("Agora sobre o produto dois, qual o valor da unidade?"))
        let valorQu2_2 = (prompt("E a quantidade?"))
    
        let ipi = (prompt("Quanto está p valor do IPI na sua região?"))
        
        let valor_total = (valor_un1_1 * valor_qu1_1 + valor_un2_2 * valorQu2_2)*(ipi/100 + 1);
         
        document.write("<br> O valor total é igual à " + valor_total .toFixed(1));

    </script>
</body>
