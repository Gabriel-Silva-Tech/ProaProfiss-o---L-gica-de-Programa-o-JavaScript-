<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Escolha de Auditório</title>
</head>
<body>
    <h1> Exercício 06: Seleção de Auditório para Evento</h1>
    <script>
        
        let nome = prompt("Nome do responsável:");

        let convidados = parseInt(prompt("Qual o número de convidados para o seu evento?"));

        if (convidados > 350) {
            alert("Quantidade de convidados superior à capacidade máxima");

        } else if (convidados < 0 || isNaN(convidados))
         {
            alert("Número de convidados inválido");

        } else {
            if (convidados <= 220) {
                let extra = Math.max(0, convidados - 150);

                alert("Use o auditório Laranja (inclua mais " + extra + " cadeiras)");

            } else {
                alert("Use o auditório Colorado");
            }

            let reserva = prompt("Gostaria de efetuar a reserva? S/N");

            if (reserva && reserva.toUpperCase() === "S") {

                alert(nome + ", reserva efetuada com sucesso.");

            } else {
                alert(nome + ", reserva não efetuada.");
            }
        }
    </script>
</body>
</html>
