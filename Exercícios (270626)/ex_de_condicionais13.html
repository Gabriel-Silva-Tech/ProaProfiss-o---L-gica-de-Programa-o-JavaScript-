<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 13: Conversor de unidade de medida de temperatura </title>
</head>
<body>
    <h1>Conversor de unidade de medida de temperatura</h1>
    <script>

        let C = parseFloat(prompt("Está quantos graus ceusius ahora?"))

         let F = (9 * C + 150) / 5 

        document.write("Veja abaixo o valor da conversão de celcius para Fahrenheit: ") 
        document.write("<br>A temperatura em Fahrenheit é: " + F)

    </script>
</body>
</html>
