<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 25: Sequencia de numeros (usando while) </title>
</head>
<body>
    <h1> Sequencia de numeros </h1>
    <script>

        let soma = 0 
        let numero = parseFloat(prompt("Digite um valor: "))

        while(numero >= 0){
            document.write()
        
        }

        numero = parseFloat(prompt("Caso queira parar a soma, digite um valor negativo: "))
       
        document.write("Realize nesse site a sua sequencia númerica!")
        document.write(" <br> O resultado da sua sequencia númerica é: " + soma)

    </script>
</body>
</html>
