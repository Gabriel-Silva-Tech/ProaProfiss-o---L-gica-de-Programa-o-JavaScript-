<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 12: testando repetições</title>
</head>
<body>
    <h1> Calculado a soma de 1 a 15 </h1>
    <script>
        let soma = 0 
        
        for (let index = 1; index <= 15; index++){
            soma = soma + index
        }
            document.write("<br>O valor da soma de 1 a 15 é: " + soma)
    </script>
    
</body>
</html>
