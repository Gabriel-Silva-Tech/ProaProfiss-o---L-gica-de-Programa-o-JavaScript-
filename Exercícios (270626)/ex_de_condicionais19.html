<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 19: Conversor de moedas </title>
</head>
<body>
    <h1> Conversor de moedas </h1>
    <script>

       let cotacao = parseFloat(prompt("Quanto está a cotação do dolar"))
       let dolar = parseFloat(prompt("Quantos dolares você quer conveter"))

       let conversao_real = dolar * cotacao

       document.write("O valor da conversão dos dolares para o real é R$" + conversao_real)
       
    </script>
</body>
</html>
