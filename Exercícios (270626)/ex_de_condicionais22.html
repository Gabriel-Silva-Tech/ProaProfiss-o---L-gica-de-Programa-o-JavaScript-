<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 22: Contar números entre 0 e 100</title>
</head>
<body>
    <h1>Exercício 22: Contar números entre 0 e 100</h1>
    <p>Clique no botão para executar o programa.</p>
    <button onclick="contarNumeros()">Executar</button>
    <p id="resultado"></p>

    <script>
        function contarNumeros() {
            let contador = 0;
            for (let i = 1; i <= 20; i++) {
                let numero = parseFloat(prompt(`Digite o ${i}º número:`));
                if (numero >= 0 && numero <= 100) {
                    contador++;
                }
            }
            document.getElementById('resultado').innerText = `Quantidade de números entre 0 e 100: ${contador}`;
        }
    </script>
</body>
</html>
