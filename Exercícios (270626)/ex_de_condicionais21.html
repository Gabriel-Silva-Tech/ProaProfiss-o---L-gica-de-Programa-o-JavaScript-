<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21 - Valor das Prestações</title>
</head>
<body>
    <h1>Exercício 21: Valor das Prestações</h1>
    <p id="resultado"></p>

    <script>
        function calcularPrestacoes() {
            let valorCompra = parseFloat(prompt("Digite o valor da compra:"));
            if (isNaN(valorCompra) || valorCompra <= 0) {
                alert("Valor inválido. Digite um número positivo.");
                return;
            }
            let valorPrestacao = valorCompra / 5;
            document.getElementById('resultado').innerText = `Valor de cada prestação: R$ ${valorPrestacao.toFixed(2)}`;
        }
    </script>
</body>
</html>
