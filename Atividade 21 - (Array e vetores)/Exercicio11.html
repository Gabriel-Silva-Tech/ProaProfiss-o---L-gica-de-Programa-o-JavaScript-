<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
</head>
<body>
    <script>

        const numeros = [];
        let somaPositivos = 0, somaNegativos = 0;

    for (let i = 0; i < 10; i++) {
    let numero = parseInt(prompt("Digite um número: "));
    numeros.push(numero);
    }

    for (let i = 0; i < numeros.length; i++) {
        if (numeros[i] > 0) {
        somaPositivos += numeros[i];
        } else if (numeros[i] < 0) {
        somaNegativos += numeros[i];
        }
    }

        document.write("Soma dos positivos: " + somaPositivos + "<br>");
        document.write("Soma dos negativos: " + somaNegativos);
        
    </script>
</body>
</html>
