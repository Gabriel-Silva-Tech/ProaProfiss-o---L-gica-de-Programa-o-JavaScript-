<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 22</title>
</head>
<body>
    <script>
        const matrizA = [];
        const matrizB = [];
        const resultado = [];

        for (let i = 0; i < 2; i++) {
        matrizA[i] = [];

        for (let j = 0; j < 2; j++) {
        matrizA[i][j] = parseInt(prompt("Matriz A [" + i + "][" + j + "]: "));
        }
    }

        for (let i = 0; i < 2; i++) {
        matrizB[i] = [];
        for (let j = 0; j < 2; j++) {
        matrizB[i][j] = parseInt(prompt("Matriz B [" + i + "][" + j + "]: "));
        }
    }

        for (let i = 0; i < 2; i++) {
        resultado[i] = [];

        for (let j = 0; j < 2; j++) {
        resultado[i][j] = 0;

        for (let k = 0; k < 2; k++) {
            resultado[i][j] += matrizA[i][k] * matrizB[k][j];
            }
        }
    }

        document.write("Produto:<br>");
        for (let i = 0; i < 2; i++) {
        document.write(resultado[i][0] + "  " + resultado[i][1] + "<br>");
    }
    
    </script>
</body>
</html>
