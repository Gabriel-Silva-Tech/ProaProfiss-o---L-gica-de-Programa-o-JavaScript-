<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>
    <script>

    const matriz = [];
    let soma = 0;

    for (let i = 0; i < 2; i++) {
    matriz[i] = [];

    for (let j = 0; j < 2; j++) {
        matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
         }
    }

    for (let i = 0; i < 2; i++) {
    
        for (let j = 0; j < 2; j++) {
        soma += matriz[i][j];
         }
    }

    document.write("Soma total: " + soma);
    </script>
</body>
</html>
