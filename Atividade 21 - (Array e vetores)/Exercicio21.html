<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 21</title>
</head>
<body>
    <script>

        const matriz = [];
        let soma = 0;

    for (let i = 0; i < 4; i++) {
    matriz[i] = [];

    for (let j = 0; j < 4; j++) {
        matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
        soma += matriz[i][j];
        }
    }

    let media = soma / 16;
    document.write("Média: " + media);
    
    </script>
</body>
</html>
