<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 28</title>
</head>

<body>
    <script>
        const matriz = [];

        for (let i = 0; i < 4; i++) {
            matriz[i] = [];

            for (let j = 0; j < 4; j++) {
                matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
            }
        }

        for (let i = 0; i < 4; i++) {
            let maior = matriz[i][0]; 

            for (let j = 1; j < 4; j++) {

                if (matriz[i][j] > maior) {
                    maior = matriz[i][j];
                }
            }
            
            document.write("Maior da linha " + i + ": " + maior + "<br>");
        }

    </script>
</body>
</html>
