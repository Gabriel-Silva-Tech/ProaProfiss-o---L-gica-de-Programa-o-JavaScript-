<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 10</title>
</head>
<body>
    <script>
        const numeros = [];
        let temZero = false;

        for (let i = 0; i < 5; i++) {
         let numero = parseInt(prompt("Digite um número: "));
         
         numeros.push(numero);
            }

        for (let i = 0; i < numeros.length; i++) {
            
            if (numeros[i] === 0) {
             temZero = true;
         }
        }

        if (temZero) {
         document.write("Há pelo menos um zero na lista.");

        } else {
        document.write("Nenhum número é zero.");
        }
    </script>
</body>
</html>
