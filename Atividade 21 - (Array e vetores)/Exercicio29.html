<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 29</title>
</head>

<body>
    <script>
        const matriz = [];
        let identidade = true;

        for (let i = 0; i < 3; i++) {
            matriz[i] = [];

            for (let j = 0; j < 3; j++) {
                matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
            }
        }

        for (let i = 0; i < 3; i++) {

            for (let j = 0; j < 3; j++) {

                if (i === j && matriz[i][j] !== 1) {
                    identidade = false;
                }

                if (i !== j && matriz[i][j] !== 0) {
                    identidade = false;
                }
            }
        }

        if (identidade) {

            document.write("É uma matriz identidade.");
            
        } else {
            document.write("NÃO é uma matriz identidade.");
        }
    </script>
</body>

</html>
