<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 16</title>
</head>
<body>
    <script>
        
        const matriz = [];

        for (let i = 0; i < 3; i++) {
        matriz[i] = []; 

        for (let j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
         }
    }


        for (let i = 0; i < 3; i++) {
         let linha = "";

        for (let j = 0; j < 3; j++) {
        linha += matriz[i][j] + "  ";
    }

        document.write(linha + "<br>");
    }
    </script>

</body>
</html>
