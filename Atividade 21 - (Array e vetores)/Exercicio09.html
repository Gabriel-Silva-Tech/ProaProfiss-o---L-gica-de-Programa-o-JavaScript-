<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 09 </title>
</head>
<body>
    <script>
        const numeros = [];
            let contPositivos = 0, contNegativos = 0;

    for (let i = 0; i < 10; i++) {
    let numero = parseInt(prompt("Digite um número: "));
    numeros.push(numero);
        }

    for (let i = 0; i < numeros.length; i++) {
        if (numeros[i] > 0) {
        contPositivos++;
         } else if (numeros[i] < 0) {
        contNegativos++;
         }
    
        }

    document.write("Positivos: " + contPositivos + "<br>");
    document.write("Negativos: " + contNegativos);
    </script>
</body>
</html>
