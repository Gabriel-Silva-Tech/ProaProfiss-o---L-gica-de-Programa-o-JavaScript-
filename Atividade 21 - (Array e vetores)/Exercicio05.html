<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 05</title>
</head>
<body>
    <script>
        const numeros = [] ;

        for (let i = 0; i <5; i++){
            
        let numero = parseInt(prompt("Digite um número: "))
        numeros.push(numero);

        }
        
        let maior = numeros[0];
        let menor = numeros[0];

        for (let i = 1; i < numeros.lenght; i++){
            
            if (numeros[i] > maior){
                maior = numeros[i];
            }

            if (numeros[i] < menor){
                menor = numeros[i];
            }
        }

        document.write("Maior: " + maior + "<br>");
        document.write("Menor: " + menor + "<br>");    


    </script>
</body>
</html>
