<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 27</title>
</head>

<body>
    <script>
        
        const matriz = [];
        let produto = 1;

        for (let i = 0; i < 3; i++) {
            matriz[i] = [];
            for (let j = 0; j < 3; j++) {
                matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
            }
        }

        
        for (let i = 0; i < 3; i++) {
            produto *= matriz[i][2 - i];
        }

    </script>
</body>

</html>
