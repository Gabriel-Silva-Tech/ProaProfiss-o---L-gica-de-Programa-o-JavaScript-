<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01</title>
</head>
<body>
    <script>    
        const numero = [];
        for(let i = 0; i < 10; i++){
            parseInt(prompt("Digite um número: "))
            numero.push(numero);

            for (let i = 0; i < numeros.lenght; i++){
                soma += numeros[i]; 
            } 
        }

        Document.write("O valor da soma é igual á " + soma);
    </script>
</body>
</html>
