<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 07 </title>
</head>
<body>
    <script>
        const numeros = [];
    let contPositivos = 0;

    for (let i = 0; i < 10; i++) {
    let numero = parseInt(prompt("Digite um número: "));
    numeros.push(numero);
    }

    for (let i = 0; i < numeros.length; i++) {
    if (numeros[i] > 0) {
        contPositivos++;
    }
    }

document.write("Positivos: " + contPositivos);
    </script>
</body>
</html>
