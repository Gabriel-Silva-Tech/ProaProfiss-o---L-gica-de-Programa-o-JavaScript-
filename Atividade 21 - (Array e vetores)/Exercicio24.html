<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 24</title>
</head>

<body>
    <script>
        const matriz = [];

        let simetrica = true;

        for (let i = 0; i < 3; i++) {
            matriz[i] = [];

            for (let j = 0; j < 3; j++) {
                matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
            }
        }

        for (let i = 0; i < 3; i++) {

            for (let j = 0; j < 3; j++) {

                if (matriz[i][j] !== matriz[j][i]) {
                    simetrica = false;
                }
            }
        }

        if (simetrica) {

            document.write("A matriz é simétrica.");

        } else {
            
            document.write("A matriz NÃO é simétrica.");
        }
    </script>
</body>

</html>
