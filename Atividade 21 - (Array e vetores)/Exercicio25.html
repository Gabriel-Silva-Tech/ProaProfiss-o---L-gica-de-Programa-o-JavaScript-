<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 25</title>
</head>

<body>
    <script>

        const matriz = [];

        for (let i = 0; i < 4; i++) {
            matriz[i] = [];
            for (let j = 0; j < 4; j++) {
                matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
            }
        }

        
        for (let j = 0; j < 4; j++) {
            let soma = 0;
            for (let i = 0; i < 4; i++) {
                soma += matriz[i][j];
            }
            document.write("Soma da coluna " + j + ": " + soma + "<br>");
        }
        
    </script>
</body>

</html>
