<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 23</title>
</head>
<body>
    <script>
        const matriz = [];

    for (let i = 0; i < 3; i++) {
    matriz[i] = [];
    
    for (let j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt("Digite o valor [" + i + "][" + j + "]: "));
        }
    }

    let menor = matriz[0][0];

    for (let i = 0; i < 3; i++) {

    for (let j = 0; j < 3; j++) {

        if (matriz[i][j] < menor) {
            menor = matriz[i][j];
            }
        }
    }

    document.write("Menor valor: " + menor);
    </script>
</body>
</html>
