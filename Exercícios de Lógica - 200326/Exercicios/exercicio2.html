    <h1> Sistema de média aritmética </h1>
<body>
    <script>
        let media_A = (8 + 9 + 7)/3
        let media_B = (4 + 5 + 6)/3
        let soma_medias = media_A + media_B
        let media_da_soma_da_media = (media_A + media_B) / 2 

        media_A = document.write ("A media do grupo A é igual à: " + media_A);
        media_B = document.write ("<br>A media do grupo B é igual à: " + media_B);
        soma_medias = document.write ("<br>A soma das medias é igual à: " + soma_medias);
        media_da_soma_da_media = document.write("<br> A media das somas da média é igual à: " +  media_da_soma_da_media);
        
    </script>
