    <h1> Porcentagem do IPI </h1>
<body>
    <script>
//Pelo que vi o ipi não tem valor fixo, por não ter vou estipular um valor de 10% = 0.10]
//O Mesmo eu vou fazer com os produtos
// Vou definir um quantidade e uma unidade

        let valor_un1_1 = 30 
        let valor_qu1_1 = 2 

        let valor_un2_2 = 40 
        let valorQu2_2 = 4 
    
        let ipi = 10
        let valor_total = (valor_un1_1 * valor_qu1_1 + valor_un2_2 * valorQu2_2)*(ipi/100 + 1);
         
        document.write("O valor total é igual à " + valor_total .toFixed(1));

    </script>
