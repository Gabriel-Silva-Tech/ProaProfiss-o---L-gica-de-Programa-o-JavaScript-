    <h1> Salario minimo </h1>
<body>
    <script>
        
        let Sal_Min = 788

        let Sal_usuario 
        Sal_usuario = parseFloat(prompt("Quanto você ganha por mês?: "));

        let quantidade = Sal_usuario / Sal_Min;

        document.write("Então você ganha: " + quantidade .toFixed(2));

    </script>
