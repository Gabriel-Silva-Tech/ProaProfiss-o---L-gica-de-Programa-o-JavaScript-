<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sistema que calcula numero sucesso e antecessor de um numero </title>
</head>
<body>
    <h1> Sistema que calcula numero sucesso e antecessor de um numero </h1>

    <script>

        let numero = parseFloat(prompt("Digite um número: "));
        let numero_anterior = numero - 1
        let numero_sucessor = numero + 1 

        document.write(" numero_anterior: " + numero_anterior );
        document.write(" <br> numero_sucessor: " + numero_sucessor);

    </script>
</body>
</html>
