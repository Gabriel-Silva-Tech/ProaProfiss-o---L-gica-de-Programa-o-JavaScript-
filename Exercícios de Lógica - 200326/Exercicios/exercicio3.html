<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sistema de impressão de Saldo </title>
</head>
    <h1> Sistema de impressão de Saldo </h1>
<body>
    <script>

         
       let saldo = parseFloat(prompt("Qual é o seu saldo atual?: "));
       let ajuste = saldo * 0.01
       let saldo_final = saldo + ajuste

       document.write("O seu saldo final é igual à: " + saldo_final);

    </script>
</body>
</html>
